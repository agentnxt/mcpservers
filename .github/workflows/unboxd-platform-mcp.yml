name: Unboxd Platform MCP Servers

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "microcloud-mcp-server/**"
      - "lxc-mcp-server/**"
      - "ansible-mcp-server/**"
      - "terraform-mcp-server/**"
      - "gcloud-run-mcp-server/**"
      - ".github/workflows/unboxd-platform-mcp.yml"
      - ".github/workflows/docker-push.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "microcloud-mcp-server/**"
      - "lxc-mcp-server/**"
      - "ansible-mcp-server/**"
      - "terraform-mcp-server/**"
      - "gcloud-run-mcp-server/**"
      - ".github/workflows/unboxd-platform-mcp.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional additional image tag to publish
        required: false
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - microcloud-mcp-server
          - lxc-mcp-server
          - ansible-mcp-server
          - terraform-mcp-server
          - gcloud-run-mcp-server
        node-version: [22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        working-directory: ${{ matrix.server }}
        run: npm install

      - name: Build TypeScript server
        working-directory: ${{ matrix.server }}
        run: npm run build

      - name: Build Docker image
        run: docker build -t ${{ matrix.server }}:ci ./${{ matrix.server }}

  publish:
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        server:
          - microcloud-mcp-server
          - lxc-mcp-server
          - ansible-mcp-server
          - terraform-mcp-server
          - gcloud-run-mcp-server
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          tags="docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}:${GITHUB_SHA}"
          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            tags+=$'
'docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}:latest
          fi
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tags+=$'
'docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}:${GITHUB_REF_NAME}
          fi
          if [[ -n "${{ inputs.image_tag || '' }}" ]]; then
            tags+=$'
'docker.io/${{ secrets.DOCKER_USERNAME }}/${{ matrix.server }}:${{ inputs.image_tag }}
          fi
          {
            echo 'value<<EOF'
            echo "$tags"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.server }}
          file: ${{ matrix.server }}/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.value }}
